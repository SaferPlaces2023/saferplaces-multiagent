services:
  flask-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: saferplaces-multiagent:latest
    container_name: saferplaces-flask

    ports:
      - "${FLASK_HOST_PORT:-5000}:5000"

    # Load secrets from .env (git-ignored); env vars below override .env values
    # that contain Windows-absolute paths — replace them with container-internal paths.
    env_file:
      - .env
    environment:
      GUNICORN_BIND: "0.0.0.0:5000"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SAFERPLACES_API_ROOT: ${SAFERPLACES_API_ROOT}
      SAFERPLACES_API_USER: ${SAFERPLACES_API_USER}
      SAFERPLACES_API_TOKEN: ${SAFERPLACES_API_TOKEN}
      SAFERCAST_API_ROOT: ${SAFERCAST_API_ROOT}
      SAFERCAST_API_USER: ${SAFERCAST_API_USER}
      SAFERCAST_API_TOKEN: ${SAFERCAST_API_TOKEN}
      FLASK_TEMPLATE_FOLDER: /app/frontend/public
      FLASK_STATIC_FOLDER: /app/frontend/public
      FLASK_STATIC_URL_PATH: /public

    volumes:
      # Mount the whole frontend repo (not just /public) so subfolder paths
      # remain intact inside the container.
      - ../saferplaces-multiagent-frontend:/app/frontend:ro

    restart: unless-stopped
